name: Deploy Infra GCP
run-name: "${{ github.actor }} - ${{ github.event.inputs.action || 'Push Apply' }}"



on:
    push:
        branches: [ master ]
    workflow_dispatch:
      inputs:
        action:
          description: 'type "destroy" to delete all resources'
          required: false
          default: 'apply'

jobs:
  #JOBS: LINTIN VALIDATION
    terraform_lint:
        name: "🧹 Lint & Validate"
        runs-on: ubuntu-latest
        steps:
          - name: Code Checkout 
            uses: action/checkout@v4

          - name: Setup terraform
            uses: hashicorp/setup-terraform@v3
            with:
              terraform_version: "1.10.0"
              cli_config_credentials_token: ${{ secrets.API_TOKEN_TF }}
          
          - name: Terraform format check
            id: terraform_check
            run: terraform fmt -check -recursive
            # the flag -check makes the command fail (exit 1) if there are improperly formatted files

          - name: Terraform init
            run: terraform init -backend=false
            # backend false avoid that terraform try to connect to bucket, just donwload the pluggins and modules

          - name: terraform validate
            id: validate
            if: steps.terraform_check.outcome == 'success'
            run: |
              echo "the init of terraform was succesfull"
              terraform validate -no-color


    #JOB1: PLANNING 
    terraform_plan:
        #needs: terraform_lint # <-- JOBS testing
        name: "🚀 Planning ${{ github.event.inputs.action || 'Push Apply' }}"
        env:
          TF_VAR_gcp_credentials: ${{ secrets.GCP_SA_TERRAFORM }}
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v6

            - name: setup terraform
              uses: hashicorp/setup-terraform@v3
              with:
                terraform_version: "1.10.0"
                #this config setup is to pass the token terraform to download the module from registry
                cli_config_credentials_token: ${{ secrets.API_TOKEN_TF }}

            # authentication to gcp from runner
            - name: Google Auth
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_SA_TERRAFORM }}

            - name: create .tfvars
              run: |
                cat <<EOF > terraform.tfvars
                prefix       = "moudulo"
                enviroment   = "lab"
                network_name = "vpc-demo-modules"
                vm_name      = "pc-for-edward"
                vm_tags      = ["env-demo", "https-server", "owner-rtenesaca"]
                vm_image     = "debian-cloud/debian-11"
                vm_type      = "e2-standard-2"
                vm_zone      = "us-central1-c"
                vm_labels    = { "env" = "demo", "app" = "webserver", "owner" = "rtenesaca" }
                EOF

            - name: terraform init
              id: init
              run: terraform init

            - name: apply plan or destroy
              run: |
                ACTION=$(echo "${{ github.event.inputs.action }}" | xargs | tr '[:upper:]' '[:lower:]')
                if [ "$ACTION" == "destroy" ]; then
                  echo "⚠️ Iniciando DESTRUCCIÓN de infraestructura..."
                  terraform plan -destroy  -out=tfplan -input=false
                else
                  echo "🚀 Iniciando DESPLIEGUE (Apply)..."
                  terraform plan -out=tfplan -input=false
                fi
            
            - name: save output plan to file
              uses: actions/upload-artifact@v4
              with:
                name: tf-plan-file
                path: tfplan

    #JOB2: APPLY
    terraform_apply:
        name: "🚀 Applying ${{ github.event.inputs.action || 'Push Apply' }}"
        needs: terraform_plan
        env:
          TF_VAR_gcp_credentials: ${{ secrets.GCP_SA_TERRAFORM }}
        runs-on: ubuntu-latest
        environment: infra_lab_iac_gcp_production
        steps:
            - name: code checkout
              uses: actions/checkout@v6

            - name: setup terraform
              uses: hashicorp/setup-terraform@v3
              with:
                terraform_version: "1.10.0"
                cli_config_credentials_token: ${{ secrets.API_TOKEN_TF }}

            # authentication to gcp from runner
            - name: Google Auth
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_SA_TERRAFORM }}

            - name: download plan file
              uses: actions/download-artifact@v4
              with:
                name: tf-plan-file

            - name: terraform init
              run: terraform init

            - name: apply plan
              run: |
                terraform apply -auto-approve tfplan

 
    #JOB3: REPORT INFROMATION
    final_report:
      name: "final information from workflow"
      needs: [terraform_lint, terraform_plan,terraform_apply ]
      if: failure()
      runs-on: ubuntu-latest
      steps:
        - name: Output information
          run: |
            echo "❌ El Workflow falló en alguna etapa."
            echo "Actor: ${{ github.actor }}"
            echo "Evento: ${{ github.event_name }}"
            # No imprimas el objeto 'github' completo por seguridad, solo lo necesario.

             

