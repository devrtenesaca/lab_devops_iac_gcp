name: Desployment Infraestructura
on:
    push:
        branches: [ master ]
    workflow_dispatch:
      inputs:
        action:
          description: 'type "destroy" to delete all resources'
          required: false
          default: 'apply'
jobs:
    terraform:
        env:
          TF_VAR_gcp_credentials: ${{ secrets.GCP_SA_TERRAFORM }}
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v6

            - name: list the source code
              run: ls -la

            - name: setup terraform
              uses: hashicorp/setup-terraform@v3
              with:
                terraform_version: "1.10.0"
                #this config setup is to pass the token terraform to download the module from registry
                cli_config_credentials_token: ${{ secrets.API_TOKEN_TF }}

            # authentication to gcp from runner
            - name: Google Auth
              uses: google-github-actions/auth@v2
              with:
                credentials_json: ${{ secrets.GCP_SA_TERRAFORM }}

            - name: create .tfvars
              run: |
                cat <<EOF > terraform.tfvars
                prefix       = "moudulo"
                enviroment   = "lab"
                network_name = "vpc-demo-modules"
                vm_name      = "pc-for-edward"
                vm_tags      = ["env-demo", "https-server", "owner-rtenesaca"]
                vm_image     = "debian-cloud/debian-11"
                vm_type      = "e2-standard-2"
                vm_zone      = "us-central1-c"
                vm_labels    = { "env" = "demo", "app" = "webserver", "owner" = "rtenesaca" }
                EOF
            - name: terraform init
              run: terraform init

            - name: terraform plan
              run: terraform plan -input=false

            - name: apply plan or destroy
              run: |
                if [" ${{ github.event.inputs.action }} " == "destroy" ]; then
                  terraform destroy -auto-approve -input=false
                else
                  terraform apply -auto-approve -input=false
                fi
            - name: upload result
              uses: actions/upload-artifact@v4
              with:
                name: certificado-final
                path: certificacion.txt

